start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = 'move-mouse window-lazy-center'

# Notify sketchybar on workspace/focus changes
exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

# Assign workspaces to monitors (3 per monitor)
# Patterns are case-insensitive regex matched against monitor names.
# Adjust the patterns if your monitors change.
# Fallback to 'main' when an external monitor is disconnected.
[workspace-to-monitor-force-assignment]
1 = ['built-in', 'main']
2 = ['built-in', 'main']
3 = ['built-in', 'main']
4 = ['LF24T35 \(2\)', 'secondary', 'main']
5 = ['LF24T35 \(2\)', 'secondary', 'main']
6 = ['LF24T35 \(2\)', 'secondary', 'main']
7 = ['LF24T35 \(1\)', 'secondary', 'main']
8 = ['LF24T35 \(1\)', 'secondary', 'main']
9 = ['LF24T35 \(1\)', 'secondary', 'main']
T1 = ['built-in', 'main']
T2 = ['LF24T35 \(2\)', 'secondary', 'main']
T3 = ['LF24T35 \(1\)', 'secondary', 'main']

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.right = 10
outer.bottom = 10
outer.top = [{ monitor."built-in" = 10 }, 35]

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

ctrl-alt-left = 'focus left'
ctrl-alt-down = 'focus down'
ctrl-alt-up = 'focus up'
ctrl-alt-right = 'focus right'

ctrl-alt-shift-left = 'move left'
ctrl-alt-shift-down = 'move down'
ctrl-alt-shift-up = 'move up'
ctrl-alt-shift-right = 'move right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

alt-f = 'fullscreen'
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'
alt-shift-r = 'mode resize'

alt-0 = 'exec-and-forget ~/.config/aerospace/scripts/temp-workspace.sh switch'
alt-shift-0 = 'exec-and-forget ~/.config/aerospace/scripts/temp-workspace.sh move'

alt-shift-d = 'exec-and-forget ~/.config/aerospace/scripts/dev-layout.sh'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
b = 'balance-sizes'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc = 'mode main'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
